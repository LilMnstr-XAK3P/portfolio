    <script>
      // Apply the saved (or system) theme before first paint to avoid a flash
      // of the wrong theme. Kept inline intentionally.
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || ((stored === null || stored === 'system') && systemDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          /* localStorage unavailable — fall back to light */
        }
      })();
    </script>
    <script>
      // spa-github-pages (https://github.com/rafgraph/spa-github-pages)
      // Decodes the redirect produced by 404.html so deep links work on
      // GitHub Pages, which has no server-side rewrite support.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
