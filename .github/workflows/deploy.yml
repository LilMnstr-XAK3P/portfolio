name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # '/portfolio/' for a project site at username.github.io/portfolio/.
          # Change to '/' if deploying to a user site (username.github.io).
          VITE_BASE_PATH: /portfolio/

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      # Publishes dist/ to the gh-pages branch, which GitHub Pages serves.
      # Branch-based deployment avoids needing the Pages site to be
      # pre-created via the API (which the workflow token cannot do).
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
