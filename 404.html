<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Professor Lily Morningstar</title>
    <script>
      // spa-github-pages (https://github.com/rafgraph/spa-github-pages)
      // GitHub Pages serves this file for unknown paths. It re-encodes the
      // requested path into a query string and redirects to index.html, where
      // the companion script restores the original URL for React Router.
      //
      // pathSegmentsToKeep = 1 for a PROJECT site (username.github.io/portfolio/).
      // Change to 0 if deploying to a USER site (username.github.io).
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
